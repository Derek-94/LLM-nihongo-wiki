name: nightly-wiki-synthesis

# 야간 위키 정리 — Claude Code가 inbox.md를 읽어 grammar/·vocab/로 종합한다.
# 트리거: 매일 밤 12시(KST) + 수동 실행 버튼.
#   (원하면 아래 push 트리거 주석을 풀어 inbox.md 변경 즉시 돌릴 수도 있음)

on:
  schedule:
    - cron: "0 15 * * *"   # 00:00 KST = 15:00 UTC (전날). KST는 UTC+9.
  workflow_dispatch:        # Actions 탭에서 수동 실행 가능
  # push:
  #   paths: ["inbox.md"]   # OpenClaw가 inbox push하면 즉시 정리하고 싶으면 주석 해제

permissions:
  contents: write           # 정리 결과를 repo에 push 하기 위함

# 동시에 여러 번 돌지 않도록(겹치면 뒤엣것 취소)
concurrency:
  group: wiki-synthesis
  cancel-in-progress: false

jobs:
  synthesize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Claude 종합 정리 (파일 수정만)
        uses: anthropics/claude-code-action@v1
        with:
          # 인증: 구독(Max/Pro) 토큰 방식 — claude setup-token 으로 발급
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # API 키 방식으로 바꾸려면 위 줄 대신 아래를 사용:
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            너는 LLM-nihongo-wiki 저장소의 "종합 에이전트"야.
            먼저 AGENTS.md를 읽고 그 규칙을 그대로 따라.

            할 일:
            1. inbox.md를 읽는다. 비어 있으면(캡처 항목이 없으면) 아무것도 하지 말고 그대로 종료.
            2. 캡처 내용을 분류: 문법은 grammar/주제.md, 단어는 vocab/{nouns,verbs,adverbs-expressions}.md로.
            3. 기존 내용과 모순/중복이면 덮어쓰지 말고 비교·통합한다.
            4. 새 단어/문법은 srs.md에 복습 항목으로 등록한다.
            5. 관련 페이지끼리 일반 markdown 링크([텍스트](경로.md))로 연결한다.
            6. 정리 끝난 inbox 항목은 inbox.md에서 제거한다(표준 형식 템플릿은 유지).

            중요: 파일 수정만 해라. git 커밋/푸시는 하지 마라(워크플로가 따로 처리한다).
          claude_args: |
            --model claude-opus-4-7
            --allowedTools Read,Edit,Write,Glob,Grep
            --max-turns 40

      - name: 변경분 커밋 & 푸시
        id: commit
        run: |
          git config user.name "wiki-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "정리할 변경 없음 (inbox 비어있었음)"
          else
            git commit -m "synthesis: 야간 자동 정리 ($(date +%F))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 텔레그램 알림
        if: always()
        env:
          BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            if [ "${{ steps.commit.outputs.changed }}" = "true" ]; then
              MSG="✅ 일본어 위키 야간 정리 완료. 새 내용이 반영됐어요."
            else
              MSG="🌙 야간 정리 실행됨 — inbox가 비어 있어 변경 없음."
            fi
          else
            MSG="❌ 야간 정리 실패. GitHub Actions 로그를 확인해 주세요. (원인: 인증/네트워크/규칙 충돌 가능)"
          fi
          curl -s -X POST "https://api.telegram.org/bot${BOT}/sendMessage" \
            -d chat_id="${CHAT}" -d text="${MSG}" > /dev/null || echo "telegram notify skipped"
